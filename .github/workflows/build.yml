name: Build

on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    branches:
      - main

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - { image: ubuntu-22.04,     arch: x86_64  }
          - { image: ubuntu-24.04,     arch: x86_64  }
          - { image: ubuntu-24.04-arm, arch: aarch64 }

    runs-on: ${{ matrix.image }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build cmake gettext desktop-file-utils appstream-util valac imagemagick libgee-0.8-dev libgtk-4-dev libadwaita-1-dev liblua5.4-dev libgeoip-dev

      - name: Extract version
        run: |
          VERSION=$(grep -oP "version: '\K[0-9]+\.[0-9]+\.[0-9]+" meson.build)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build
        run: |
          meson setup builddir --buildtype=release --prefix=/usr
          cd builddir && ninja && ninja test
          DESTDIR=$GITHUB_WORKSPACE/out ninja install

      - name: Setup AppImage dependencies
        if: matrix.image == 'ubuntu-24.04' || matrix.image == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get install -y libfuse2t64
          wget -c "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch }}.AppImage" -O linuxdeploy.AppImage
          chmod +x linuxdeploy.AppImage
          wget -c "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy-plugin-gtk.sh

      - name: Build AppImage
        if: matrix.image == 'ubuntu-24.04' || matrix.image == 'ubuntu-24.04-arm'
        run: |
          mkdir -p AppDir/usr
          cp -a out/usr/. AppDir/usr/
          chmod +x AppDir/usr/bin/gswatcher
          export OUTPUT="gswatcher-${{ env.APP_VERSION }}-${{ matrix.arch }}.AppImage"
          export DEPLOY_GTK_VERSION=4
          export NO_STRIP=1
          ./linuxdeploy.AppImage --appdir AppDir --plugin gtk --output appimage \
            --icon-file AppDir/usr/share/icons/hicolor/512x512/apps/io.github.lxndr.gswatcher.png \
            --desktop-file AppDir/usr/share/applications/io.github.lxndr.gswatcher.desktop

      - name: Upload AppImage
        if: matrix.image == 'ubuntu-24.04' || matrix.image == 'ubuntu-24.04-arm'
        uses: actions/upload-artifact@v7
        with:
          name: gswatcher-${{ env.APP_VERSION }}-appimage-${{ matrix.arch }}
          path: gswatcher-${{ env.APP_VERSION }}-${{ matrix.arch }}.AppImage

  build-windows:
    strategy:
      matrix:
        include:
          - { image: windows-2022,   arch: x86_64,  sys: ucrt64     }
          - { image: windows-11-arm, arch: aarch64, sys: clangarm64 }

    runs-on: ${{ matrix.image }}

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v6

      - name: Setup dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.sys }}
          update: true
          pacboy: >-
            gcc:p
            gcc-libs:p
            meson:p
            ninja:p
            pkg-config:p
            gettext:p
            appstream:p
            vala:p
            libgee:p
            libadwaita:p
            lua:p
            geoip:p
            imagemagick:p
            inkscape:p
            zip:

      - name: Extract version
        run: |
          VERSION=$(grep -oP "version: '\K[0-9]+\.[0-9]+\.[0-9]+" meson.build)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build
        run: |
          meson setup builddir --buildtype=release
          cd builddir && ninja && ninja test
          install_root="$(cygpath -u "$GITHUB_WORKSPACE")/install"
          DESTDIR="$install_root" ninja install
          rm -rf stage
          mv "$install_root/a/_temp/msys64/${{ matrix.sys }}" stage
          rm -rf install

      - name: Create portable distribution
        run: |
          ldd stage/bin/gswatcher.exe | grep -o '/.*\.dll' | while read -r dll; do
            if [[ "$dll" == /${{ matrix.sys }}/bin/* ]]; then
              cp "$dll" stage/bin/
            fi
          done

          mkdir -p stage/etc
          cp /${{ matrix.sys }}/bin/gdbus.exe stage/bin
          cp -r /${{ matrix.sys }}/etc/fonts stage/etc
          cp -r /${{ matrix.sys }}/share/fontconfig stage/share
          cp -r /${{ matrix.sys }}/share/glib-2.0/schemas stage/share/glib-2.0
          cp -r /${{ matrix.sys }}/share/icons stage/share && rm -r stage/share/icons/Adwaita/cursors
          cp -r /${{ matrix.sys }}/share/locale stage/share

          mkdir -p stage/share/GeoIP
          wget -O /tmp/GeoIPCity.dat.gz https://sources.archlinux.org/other/packages/geoip-database/20250129/GeoIPCity.dat.gz
          gzip -dc /tmp/GeoIPCity.dat.gz > stage/share/GeoIP/GeoIPCity.dat

          wget -O /tmp/flags_1.0.4.tar.xz http://packages.linuxmint.com/pool/main/f/flags/flags_1.0.4.tar.xz
          tar -xf /tmp/flags_1.0.4.tar.xz -C /tmp && cp -r /tmp/flags/usr/share/iso-flag-png stage/share

          glib-compile-schemas.exe stage/share/glib-2.0/schemas

      - name: Upload portable distribution
        uses: actions/upload-artifact@v7
        with:
          name: gswatcher-${{ env.APP_VERSION }}-windows-portable-${{ matrix.arch }}
          path: stage

  release:
    runs-on: ubuntu-24.04
    needs: [build-linux, build-windows]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: gswatcher-*
          path: artifacts
          merge-multiple: true

      - name: Extract version
        run: |
          VERSION=$(echo "$GITHUB_REF" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+')
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Prepare release artifacts
        run: |
          for dir in artifacts/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")

            if [[ "$name" =~ -windows-portable-(x86_64|aarch64)$ ]]; then
              arch="${BASH_REMATCH[1]}"
              (cd "$dir" && zip -r "../gswatcher-v${{ env.APP_VERSION }}-windows-portable-$arch.zip" .)
              rm -rf "$dir"
            elif [[ "$name" =~ -appimage-(x86_64|aarch64)$ ]]; then
              arch="${BASH_REMATCH[1]}"
              appimage=$(find "$dir" -name '*.AppImage' -print -quit)
              [ -n "$appimage" ] && cp "$appimage" "artifacts/gswatcher-v${{ env.APP_VERSION }}-$arch.AppImage"
              rm -rf "$dir"
            fi
          done

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          generate_release_notes: false
          files: |
            artifacts/*.zip
            artifacts/*.AppImage
